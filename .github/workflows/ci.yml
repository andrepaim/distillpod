name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          # Install requirements but skip faster-whisper (needs native libs,
          # only used at runtime in transcriber.py, fully mocked in tests)
          grep -v 'faster-whisper' backend/requirements.txt > /tmp/requirements-ci.txt
          pip install -r /tmp/requirements-ci.txt
          pip install pytest pytest-asyncio markdown requests
          # Create a stub module so imports don't fail
          python -c "
          import os, sys
          site = next(p for p in sys.path if 'site-packages' in p)
          os.makedirs(os.path.join(site, 'faster_whisper'), exist_ok=True)
          with open(os.path.join(site, 'faster_whisper', '__init__.py'), 'w') as f:
              f.write('class WhisperModel:\n    def __init__(self, *a, **kw): pass\n')
          "
      - name: Run tests
        run: python -m pytest tests/ -v
        env:
          PYTHONPATH: backend
